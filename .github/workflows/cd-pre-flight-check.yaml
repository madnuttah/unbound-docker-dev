name: CD Pre Flight Check

on:
  workflow_run:
    workflows:
      - "CD Build Unbound"
      - "CD Build Canary Unbound"
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    env:
      DOCKERHUB_SLUG: "madnuttah/unbound-dev"

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Check both build workflows
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REQUIRED_WORKFLOWS=(
            "CD Build Unbound"
            "CD Build Canary Unbound"
          )

          for WF in "${REQUIRED_WORKFLOWS[@]}"; do
            STATUS=$(gh run list \
              --workflow "$WF" \
              --branch "${GITHUB_REF_NAME}" \
              --limit 1 \
              --json conclusion \
              -q '.[0].conclusion')

            if [ "$STATUS" != "success" ]; then
              echo "Workflow '$WF' not successful yet. Exiting."
              exit 1
            fi
          done

          echo "ALL_BUILDS_OK=true" >> "$GITHUB_ENV"

  test-images:
    needs: preflight
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tag:
          - latest
          - latest-quic
          - canary
          - canary-quic

    env:
      DOCKERHUB_SLUG: "madnuttah/unbound-dev"

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull image
        run: docker pull "$DOCKERHUB_SLUG:${{ matrix.tag }}" || exit 1

      - name: Start container
        run: |
          if [[ "${{ matrix.tag }}" == *"quic" ]]; then
            docker run -d --name unbound-test -p 5335:5335/udp "$DOCKERHUB_SLUG:${{ matrix.tag }}" || true
          else
            docker run -d --name unbound-test -p 5335:5335/udp "$DOCKERHUB_SLUG:${{ matrix.tag }}"
          fi

      - name: Wait for readiness
        run: |
          for i in {1..20}; do
            if docker logs unbound-test 2>&1 | grep -q "start of service"; then
              exit 0
            fi
            sleep 1
          done
          docker logs unbound-test
          exit 1

      - name: DNS test
        run: |
          if [[ "${{ matrix.tag }}" == *"quic" ]]; then
            timeout 10s docker exec unbound-test drill cloudflare.com A || true
          else
            timeout 10s docker exec unbound-test drill cloudflare.com A
          fi

      - name: Cleanup
        if: always()
        run: docker rm -f unbound-test || true
