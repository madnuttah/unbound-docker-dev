name: CD Publish Unbound Manifests

on:
  workflow_run:
    workflows:
      - CD Testdrive Unbound Docker Images
    types:
      - completed

permissions:
  actions: read
  checks: write
  contents: read

env:
  DOCKERHUB_SLUG: "madnuttah/unbound-docker-dev"

jobs:
  publish-manifests:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - name: Download metadata artifact (non-QUIC)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: unbound-build-metadata
          path: metadata
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      - name: Download metadata artifact (QUIC)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: unbound-quic-build-metadata
          path: metadata
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      - name: Ensure metadata exists
        run: |
          if [ ! -f metadata/variant.txt ]; then
            echo "No metadata artifact found for this workflow run."
            exit 1
          fi

      - name: Read variant
        id: variant
        shell: bash
        run: |
          set -euo pipefail
          VARIANT="$(cat metadata/variant.txt)"
          printf "VARIANT=%s\n" "$VARIANT" >> "$GITHUB_ENV"

      - name: Read version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(cat metadata/version.txt)"
          printf "VERSION=%s\n" "$VERSION" >> "$GITHUB_ENV"

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create manifest
        shell: bash
        run: |
          set -euo pipefail

          case "$VARIANT" in
            stable)
              docker buildx imagetools create \
                -t "${DOCKERHUB_SLUG}:${VERSION}" \
                -t "${DOCKERHUB_SLUG}:latest" \
                "${DOCKERHUB_SLUG}:${VERSION}-amd64" \
                "${DOCKERHUB_SLUG}:${VERSION}-arm64" \
                "${DOCKERHUB_SLUG}:${VERSION}-386" \
                "${DOCKERHUB_SLUG}:${VERSION}-armv6" \
                "${DOCKERHUB_SLUG}:${VERSION}-armv7" \
                "${DOCKERHUB_SLUG}:${VERSION}-ppc64le" \
                "${DOCKERHUB_SLUG}:${VERSION}-s390x" \
                "${DOCKERHUB_SLUG}:${VERSION}-riscv64"
              ;;

            stable-quic)
              docker buildx imagetools create \
                -t "${DOCKERHUB_SLUG}:${VERSION}-quic" \
                -t "${DOCKERHUB_SLUG}:latest-quic" \
                "${DOCKERHUB_SLUG}:${VERSION}-quic-amd64" \
                "${DOCKERHUB_SLUG}:${VERSION}-quic-arm64" \
                "${DOCKERHUB_SLUG}:${VERSION}-quic-386" \
                "${DOCKERHUB_SLUG}:${VERSION}-quic-armv6" \
                "${DOCKERHUB_SLUG}:${VERSION}-quic-armv7" \
                "${DOCKERHUB_SLUG}:${VERSION}-quic-ppc64le" \
                "${DOCKERHUB_SLUG}:${VERSION}-quic-s390x" \
                "${DOCKERHUB_SLUG}:${VERSION}-quic-riscv64"
              ;;

            canary)
              docker buildx imagetools create \
                -t "${DOCKERHUB_SLUG}:canary" \
                "${DOCKERHUB_SLUG}:canary-amd64" \
                "${DOCKERHUB_SLUG}:canary-arm64" \
                "${DOCKERHUB_SLUG}:canary-386" \
                "${DOCKERHUB_SLUG}:canary-armv6" \
                "${DOCKERHUB_SLUG}:canary-armv7" \
                "${DOCKERHUB_SLUG}:canary-ppc64le" \
                "${DOCKERHUB_SLUG}:canary-s390x" \
                "${DOCKERHUB_SLUG}:canary-riscv64"
              ;;

            canary-quic)
              docker buildx imagetools create \
                -t "${DOCKERHUB_SLUG}:canary-quic" \
                "${DOCKERHUB_SLUG}:canary-quic-amd64" \
                "${DOCKERHUB_SLUG}:canary-quic-arm64" \
                "${DOCKERHUB_SLUG}:canary-quic-386" \
                "${DOCKERHUB_SLUG}:canary-quic-armv6" \
                "${DOCKERHUB_SLUG}:canary-quic-armv7" \
                "${DOCKERHUB_SLUG}:canary-quic-ppc64le" \
                "${DOCKERHUB_SLUG}:canary-quic-s390x" \
                "${DOCKERHUB_SLUG}:canary-quic-riscv64"
              ;;

            *)
              echo "Unknown variant: $VARIANT" >&2
              exit 1
              ;;
          esac
