name: CD Build Canary Unbound Docker Image

on:
  schedule:
    - cron: "0 19 * * mon-fri"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  packages: write
  id-token: write

jobs:
  check-update:
    runs-on: ubuntu-latest
    outputs:
      UNBOUND_GIT_SHA: ${{ steps.check.outputs.UNBOUND_GIT_SHA }}
      HAS_UPDATE: ${{ steps.check.outputs.HAS_UPDATE }}

    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check for update
        id: check
        run: |
          set -euo pipefail
          
          REMOTE_SHA="$(git ls-remote https://github.com/NLnetLabs/unbound.git HEAD | cut -f1)" || exit 1
          
          if [ -z "$REMOTE_SHA" ]; then
            exit 1
          fi

          CURRENT_SHA="$(cat versions/unbound-git-sha.txt 2>/dev/null || echo '')"

          if [ "$CURRENT_SHA" = "$REMOTE_SHA" ]; then
            echo "HAS_UPDATE=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "UNBOUND_GIT_SHA=$REMOTE_SHA" >> "$GITHUB_OUTPUT"
          echo "HAS_UPDATE=true" >> "$GITHUB_OUTPUT"

  build:
    needs: check-update
    if: needs.check-update.outputs.HAS_UPDATE == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    env:
      DOCKERHUB_SLUG: "madnuttah/unbound-dev"

    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set buildvars
        id: vars
        run: |
          set -euo pipefail
          
          echo "IMAGE_BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"

          OPENSSL_BE=$(grep '^openssl=' versions/openssl-buildenv.txt | cut -d= -f2)
          OPENSSL_SUB=$(grep '^sub=' versions/openssl-buildenv.txt | cut -d= -f2)
          OPENSSL_BUILDENV_VERSION="${OPENSSL_BE}-${OPENSSL_SUB}"
          
          echo "OPENSSL_BUILDENV_VERSION=${OPENSSL_BUILDENV_VERSION}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
        id: buildx

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        if: github.event_name != 'pull_request'
        with:
          username: "${{ secrets.DOCKERHUB_USERNAME }}"
          password: "${{ secrets.DOCKERHUB_TOKEN }}"

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          builder: "${{ steps.buildx.outputs.name }}"
          file: ./unbound/canary.Dockerfile
          platforms: |
            linux/amd64,linux/arm64,linux/386,
            linux/arm/v6,linux/arm/v7,
            linux/ppc64le,linux/s390x,linux/riscv64

          build-args: |
            IMAGE_BUILD_DATE=${{ steps.vars.outputs.IMAGE_BUILD_DATE }}
            OPENSSL_BUILDENV_VERSION=${{ steps.vars.outputs.OPENSSL_BUILDENV_VERSION }}

          sbom: ${{ github.event_name != 'pull_request' }}
          provenance: ${{ github.event_name != 'pull_request' }}

          cache-from: |
            type=registry,ref=${{ env.DOCKERHUB_SLUG }}:buildcache-canary

          cache-to: |
            type=registry,ref=${{ env.DOCKERHUB_SLUG }}:buildcache-canary,mode=max

          push: ${{ github.event_name != 'pull_request' }}

          tags: |
            ${{ env.DOCKERHUB_SLUG }}:canary

      - uses: aquasecurity/trivy-action@bfa4b33a029b9aa80ddb784b45574c30e072c59e # master
        if: ${{ github.event_name != 'pull_request' }}
        with:
          image-ref: ${{ env.DOCKERHUB_SLUG }}:canary
          exit-code: "1"
          ignore-unfixed: false
          scan-type: image
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
          format: "table"

      - uses: docker/scout-action@bacf462e8d090c09660de30a6ccc718035f961e3 # v1
        if: ${{ github.event_name != 'pull_request' }}
        with:
          command: cves
          image: ${{ env.DOCKERHUB_SLUG }}:canary
          only-fixed: true
          only-severities: critical,high
          write-comment: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          exit-code: false