name: CD Build Canary Unbound Docker Image

on:
  workflow_dispatch:
  push:
    paths:
      - "versions/unbound-git-sha.txt"

permissions:
  actions: read
  contents: read
  packages: write
  id-token: write

jobs:
  buildvars:
    runs-on: ubuntu-latest
    outputs:
      IMAGE_BUILD_DATE: "${{ steps.vars.outputs.IMAGE_BUILD_DATE }}"
      OPENSSL_BUILDENV_VERSION: "${{ steps.vars.outputs.OPENSSL_BUILDENV_VERSION }}"
      UNBOUND_VERSION: "${{ steps.vars.outputs.UNBOUND_VERSION }}"

    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
          fetch-depth: 0
          
      - name: Set buildvars
        id: vars
        run: |
          set -euo pipefail

          IMAGE_BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "IMAGE_BUILD_DATE=$IMAGE_BUILD_DATE" >> "$GITHUB_OUTPUT"

          UNBOUND_VERSION=$(
            curl -fsSL https://raw.githubusercontent.com/NLnetLabs/unbound/master/configure \
            | awk -F= '/^version=/ { print $2 }'
          )
          echo "UNBOUND_VERSION=$UNBOUND_VERSION" >> "$GITHUB_OUTPUT"

          RESP=$(curl -fsSL https://api.github.com/repos/madnuttah/openssl-buildenv/releases)
          echo "$RESP" | jq empty

          OPENSSL_BUILDENV_VERSION=$(
            echo "$RESP" |
            jq -r '
              map(select(.prerelease == false and (.name | endswith("-quic") | not)))
              | first
              | .name
            '
          )

          echo "OPENSSL_BUILDENV_VERSION=$OPENSSL_BUILDENV_VERSION" >> "$GITHUB_OUTPUT"

      - name: Show build variables
        run: |
          echo "IMAGE_BUILD_DATE=${{ steps.vars.outputs.IMAGE_BUILD_DATE }}"
          echo "UNBOUND_VERSION=${{ steps.vars.outputs.UNBOUND_VERSION }}"
          echo "OPENSSL_BUILDENV_VERSION=${{ steps.vars.outputs.OPENSSL_BUILDENV_VERSION }}"

  build:
    needs: buildvars
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64
          - arch: 386
            platform: linux/386
          - arch: armv6
            platform: linux/arm/v6
          - arch: armv7
            platform: linux/arm/v7
          - arch: ppc64le
            platform: linux/ppc64le
          - arch: s390x
            platform: linux/s390x
          - arch: riscv64
            platform: linux/riscv64
    
    permissions:
      contents: read
      packages: write
      id-token: write

    env:
      DOCKERHUB_SLUG: "madnuttah/unbound-dev"

    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5
        id: buildx

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        if: github.event_name != 'pull_request'
        with:
          username: "${{ secrets.DOCKERHUB_USERNAME }}"
          password: "${{ secrets.DOCKERHUB_TOKEN }}"

      - name: Build and push arch image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          builder: "${{ steps.buildx.outputs.name }}"
          file: ./unbound/canary.Dockerfile

          platforms: ${{ matrix.platform }}
          push: true

          build-args: |
            IMAGE_BUILD_DATE=${{ needs.buildvars.outputs.IMAGE_BUILD_DATE }}
            OPENSSL_BUILDENV_VERSION=${{ needs.buildvars.outputs.OPENSSL_BUILDENV_VERSION }}
            UNBOUND_VERSION=${{ needs.buildvars.outputs.UNBOUND_VERSION }}

          sbom: ${{ github.event_name != 'pull_request' }}
          provenance: ${{ github.event_name != 'pull_request' }}

          cache-from: |
            type=registry,ref=${{ env.DOCKERHUB_SLUG }}:buildcache-canary-${{ matrix.arch }}

          cache-to: |
            type=registry,ref=${{ env.DOCKERHUB_SLUG }}:buildcache-canary-${{ matrix.arch }},mode=max

          tags: |
            ${{ env.DOCKERHUB_SLUG }}:canary-${{ matrix.arch }}

      - name: Write variant
        run: echo "canary" > variant.txt

      - name: Upload variant
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: unbound-canary
          path: variant.txt
