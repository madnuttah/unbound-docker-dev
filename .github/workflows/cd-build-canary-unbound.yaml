name: CD Build Canary Unbound

on:
  schedule:
    - cron: "0 19 * * mon-fri"
  workflow_dispatch:

permissions: {}

jobs:

  check-update:
    runs-on: ubuntu-latest
    outputs:
      UNBOUND_GIT_SHA: ${{ steps.check.outputs.UNBOUND_GIT_SHA }}
      changed: ${{ steps.check.outputs.changed }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          ref: main
          persist-credentials: false
          clean: false
          sparse-checkout-cone-mode: false
          fetch-depth: 0

      - name: Debug workspace
        run: |
          echo "Workspace content:"
          ls -R .

      - name: Check for update
        id: check
        run: |
          UNBOUND_GIT_SHA="$(git ls-remote https://github.com/NLnetLabs/unbound.git HEAD | cut -f1)"
          echo "UNBOUND_GIT_SHA=$UNBOUND_GIT_SHA" >> $GITHUB_OUTPUT

          CURRENT_SHA="$(cat versions/unbound-git-sha.txt 2>/dev/null || echo '')"

          if [[ "$CURRENT_SHA" = "$UNBOUND_GIT_SHA" ]]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

  update-sha:
    needs: check-update
    if: needs.check-update.outputs.changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          ref: main
          persist-credentials: false
          clean: false
          sparse-checkout-cone-mode: false
          fetch-depth: 0

      - name: Import GPG key
        id: IMPORT_GPG
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Push updated unbound_git_sha
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          NEW_SHA: ${{ needs.check-update.outputs.UNBOUND_GIT_SHA }}
        run: |
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}"
          echo "$NEW_SHA" > versions/unbound-git-sha.txt
          git add versions/unbound-git-sha.txt
          git commit -m "Updated unbound_git_sha (canary)" || true
          git push origin main || true

  build:
    needs: [check-update, update-sha]
    if: needs.check-update.outputs.changed == 'true'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        build:
          - name: canary
            dockerfile: docker/canary.Dockerfile
            tag: canary
            cache_key: buildcache-canary
          - name: canary-quic
            dockerfile: docker/canary_quic.Dockerfile
            tag: canary-quic
            cache_key: buildcache-canary-quic

    env:
      DOCKERHUB_SLUG: "madnuttah/unbound-dev"

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          ref: main
          persist-credentials: false
          clean: false
          sparse-checkout-cone-mode: false
          fetch-depth: 0


      - name: Set buildvars
        id: vars
        run: |
          echo "IMAGE_BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT

          echo "UNBOUND_VERSION=$(curl -s https://raw.githubusercontent.com/NLnetLabs/unbound/master/configure \
            | awk -F= '/^version=/ { print $2 }')" >> $GITHUB_OUTPUT

          echo OPENSSL_BUILDENV_VERSION="$(curl -s https://api.github.com/repos/madnuttah/openssl-buildenv/releases \
            | jq -r '[.[] | select(.prerelease == false)][0].name')" >> $GITHUB_OUTPUT

          echo OPENSSL_QUIC_BUILDENV_VERSION="$(curl -s https://api.github.com/repos/madnuttah/openssl-buildenv/releases \
            | jq -r '[.[] | select(.prerelease == false)][0].name')-quic" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Select variant metadata
        id: meta
        run: |
          echo "DOCKERFILE=${{ matrix.build.dockerfile }}" >> "$GITHUB_OUTPUT"
          echo "TAG=${{ matrix.build.tag }}" >> "$GITHUB_OUTPUT"
          echo "CACHE_KEY=${{ matrix.build.cache_key }}" >> "$GITHUB_OUTPUT"

      - name: Build and push Canary image
        uses: docker/build-push-action@v6
        with:
          context: .
          builder: ${{ steps.buildx.outputs.name }}
          file: ${{ steps.meta.outputs.DOCKERFILE }}

          build-contexts: |
            base=docker/base

          platforms: |
            linux/amd64,linux/arm64,linux/386,
            linux/arm/v6,linux/arm/v7,
            linux/ppc64le,linux/s390x,linux/riscv64

          build-args: |
            IMAGE_BUILD_DATE=${{ steps.vars.outputs.IMAGE_BUILD_DATE }}
            UNBOUND_VERSION=${{ steps.vars.outputs.UNBOUND_VERSION }}
            OPENSSL_BUILDENV_VERSION=${{ steps.vars.outputs.OPENSSL_BUILDENV_VERSION }}
            OPENSSL_QUIC_BUILDENV_VERSION=${{ steps.vars.outputs.OPENSSL_QUIC_BUILDENV_VERSION }}

          cache-from: |
            type=registry,ref=${{ env.DOCKERHUB_SLUG }}:${{ steps.meta.outputs.CACHE_KEY }}

          cache-to: |
            type=registry,ref=${{ env.DOCKERHUB_SLUG }}:${{ steps.meta.outputs.CACHE_KEY }},mode=max

          push: true

          tags: |
            ${{ env.DOCKERHUB_SLUG }}:${{ steps.meta.outputs.TAG }}
