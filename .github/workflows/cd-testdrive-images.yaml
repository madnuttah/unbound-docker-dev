name: CD Testdrive Unbound Docker Images

on:
  workflow_run:
    workflows:
      - CD Build Unbound Docker Image
      - CD Build Unbound QUIC Docker Image
      - CD Build Canary Unbound Docker Image
      - CD Build Canary Unbound QUIC Docker Image
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  test-image:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with:
          egress-policy: audit

      - name: Try download stable
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: stable
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Try download stable-quic
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: stable-quic
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Try download canary
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: canary
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Try download canary-quic
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: canary-quic
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Detect variant
        run: |
          if [ -f stable/variant.txt ]; then
            VARIANT=stable
          elif [ -f stable-quic/variant.txt ]; then
            VARIANT=stable-quic
          elif [ -f canary/variant.txt ]; then
            VARIANT=canary
          elif [ -f canary-quic/variant.txt ]; then
            VARIANT=canary-quic
          else
            echo "No variant artifact found"
            exit 1
          fi

          echo "VARIANT=$VARIANT" >> $GITHUB_ENV

      - name: Determine image tag
        run: |
          case "$VARIANT" in
            stable)
              echo "IMAGE_TAG=madnuttah/unbound:latest" >> "$GITHUB_ENV"
              ;;
            stable-quic)
              echo "IMAGE_TAG=madnuttah/unbound:latest-quic" >> "$GITHUB_ENV"
              ;;
            canary)
              echo "IMAGE_TAG=madnuttah/unbound:canary" >> "$GITHUB_ENV"
              ;;
            canary-quic)
              echo "IMAGE_TAG=madnuttah/unbound:canary-quic" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull image
        run: docker pull "$IMAGE_TAG" || true

      - name: Start container
        run: |
          if [[ "$IMAGE_TAG" == *"-quic" ]]; then
            docker run -d --name unbound-dns -p 5335:5335/udp "$IMAGE_TAG" || true
          else
            docker run -d --name unbound-dns -p 5335:5335/udp "$IMAGE_TAG"
          fi

      - name: Wait for Unbound readiness
        run: |
          for i in {1..20}; do
            if docker logs unbound-dns 2>&1 | grep -q "start of service"; then
              exit 0
            fi
            sleep 1
          done
          docker logs unbound-dns
          exit 1

      - name: DNS test
        run: |
          if [[ "$IMAGE_TAG" == *"-quic" ]]; then
            timeout 10s docker exec unbound-dns drill cloudflare.com A || true
          else
            timeout 10s docker exec unbound-dns drill cloudflare.com A
          fi

      - name: Cleanup
        if: always()
        run: docker rm -f unbound-dns || true
