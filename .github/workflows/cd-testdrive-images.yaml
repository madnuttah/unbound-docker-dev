name: CD Testdrive Unbound Docker Images

on:
  workflow_run:
    workflows:
      - CD Build Unbound Docker Image
      - CD Build Unbound QUIC Docker Image
      - CD Build Canary Unbound Docker Image
      - CD Build Canary Unbound QUIC Docker Image
    types:
      - completed

permissions:
  actions: read
  checks: write
  contents: read

jobs:
  test-image:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with:
          egress-policy: audit

      - name: Fetch metadata artifact ID
        id: fetch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          RUN_ID="${{ github.event.workflow_run.id }}"
          echo "Polling GitHub API for metadata artifacts in run $RUN_ID"

          NAMES=("unbound-build-metadata" "unbound-quic-build-metadata")

          ARTIFACT_ID=""
          ARTIFACT_NAME=""

          for name in "${NAMES[@]}"; do
            echo "Checking for artifact: $name"

            for i in {1..10}; do
              ID=$(gh api "/repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts" \
                --jq ".artifacts[] | select(.name==\"$name\") | .id" || true)

              if [[ -n "$ID" ]]; then
                ARTIFACT_ID="$ID"
                ARTIFACT_NAME="$name"
                echo "Found artifact: $name (ID=$ID)"
                break 2
              fi

              echo "Not found yet, retry $i/10..."
              sleep 3
            done
          done

          if [[ -z "$ARTIFACT_ID" ]]; then
            echo "ERROR: No metadata artifact found in run $RUN_ID"
            exit 1
          fi

          echo "artifact_id=$ARTIFACT_ID" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"

      - name: Download metadata artifact via API
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}

        run: |
          set -euo pipefail

          ARTIFACT_ID="${{ steps.fetch.outputs.artifact_id }}"
          ARTIFACT_NAME="${{ steps.fetch.outputs.artifact_name }}"

          echo "Downloading artifact $ARTIFACT_NAME (ID=$ARTIFACT_ID)"

          gh api "/repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip" \
            --output artifact.zip

          mkdir metadata
          unzip artifact.zip -d metadata

          echo "Downloaded metadata content:"
          ls -R metadata

      - name: Ensure metadata exists
        run: |
          if [ ! -f metadata/variant.txt ]; then
            echo "No metadata artifact found for this workflow run."
            exit 1
          fi

      - name: Detect variant
        run: |
          VARIANT="$(cat metadata/variant.txt)"
          echo "VARIANT=$VARIANT" >> "$GITHUB_ENV"

      - name: Determine image tag
        run: |
          case "$VARIANT" in
            stable)
              echo "IMAGE_TAG=madnuttah/unbound:latest" >> "$GITHUB_ENV"
              ;;
            stable-quic)
              echo "IMAGE_TAG=madnuttah/unbound:latest-quic" >> "$GITHUB_ENV"
              ;;
            canary)
              echo "IMAGE_TAG=madnuttah/unbound:canary" >> "$GITHUB_ENV"
              ;;
            canary-quic)
              echo "IMAGE_TAG=madnuttah/unbound:canary-quic" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unknown variant: $VARIANT"
              exit 1
              ;;
          esac

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull image
        run: docker pull "$IMAGE_TAG" || true

      - name: Start container
        run: |
          if [[ "$IMAGE_TAG" == *"-quic" ]]; then
            docker run -d --name unbound-dns -p 5335:5335/udp "$IMAGE_TAG" || true
          else
            docker run -d --name unbound-dns -p 5335:5335/udp "$IMAGE_TAG"
          fi

      - name: Wait for Unbound readiness
        run: |
          for _ in {1..20}; do
            if docker logs unbound-dns 2>&1 | grep -q "start of service"; then
              exit 0
            fi
            sleep 1
          done
          docker logs unbound-dns
          exit 1

      - name: DNS test
        run: |
          timeout 10s docker exec unbound-dns drill cloudflare.com A || true

      - name: Cleanup
        if: always()
        run: docker rm -f unbound-dns || true
