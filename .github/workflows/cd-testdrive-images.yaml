name: CD Testdrive Unbound Docker Images

on:
  workflow_run:
    workflows:
      - CD Build Unbound Docker Image
      - CD Build Unbound QUIC Docker Image
      - CD Build Canary Unbound Docker Image
      - CD Build Canary Unbound QUIC Docker Image
    types:
      - completed

permissions:
  actions: read
  checks: write
  contents: read

jobs:
  test-image:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with:
          egress-policy: audit

      - name: Debug workflow_run name
        run: echo "workflow_run.name = '${{ github.event.workflow_run.name }}'"


      - name: Download Canary QUIC artifacts
        if: contains(github.event.workflow_run.name, 'Canary Unbound QUIC')
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: variant-canary-quic-*
          merge-multiple: true
          run-id: ${{ github.event.workflow_run.id }}

      - name: Download Canary artifacts
        if: contains(github.event.workflow_run.name, 'Canary Unbound') && !contains(github.event.workflow_run.name, 'QUIC')
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: variant-canary-*
          merge-multiple: true
          run-id: ${{ github.event.workflow_run.id }}

      - name: Download Stable QUIC artifacts
        if: contains(github.event.workflow_run.name, 'Unbound QUIC') && !contains(github.event.workflow_run.name, 'Canary')
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: variant-stable-quic-*
          merge-multiple: true
          run-id: ${{ github.event.workflow_run.id }}

      - name: Download Stable artifacts
        if: contains(github.event.workflow_run.name, 'Unbound Docker Image') && !contains(github.event.workflow_run.name, 'QUIC') && !contains(github.event.workflow_run.name, 'Canary')
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: variant-stable-*
          merge-multiple: true
          run-id: ${{ github.event.workflow_run.id }}

      - name: Detect variant
        run: |
          if ls variant-canary-quic-* 2>/dev/null; then
            echo "VARIANT=canary-quic" >> "$GITHUB_ENV"
          elif ls variant-canary-* 2>/dev/null; then
            echo "VARIANT=canary" >> "$GITHUB_ENV"
          elif ls variant-stable-quic-* 2>/dev/null; then
            echo "VARIANT=stable-quic" >> "$GITHUB_ENV"
          elif ls variant-stable-* 2>/dev/null; then
            echo "VARIANT=stable" >> "$GITHUB_ENV"
          else
            echo "No variant artifacts found"
            exit 1
          fi

      - name: Determine image tag
        run: |
          case "$VARIANT" in
            stable)
              echo "IMAGE_TAG=madnuttah/unbound:latest" >> "$GITHUB_ENV"
              ;;
            stable-quic)
              echo "IMAGE_TAG=madnuttah/unbound:latest-quic" >> "$GITHUB_ENV"
              ;;
            canary)
              echo "IMAGE_TAG=madnuttah/unbound:canary" >> "$GITHUB_ENV"
              ;;
            canary-quic)
              echo "IMAGE_TAG=madnuttah/unbound:canary-quic" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull image
        run: docker pull "$IMAGE_TAG" || true

      - name: Start container
        run: |
          if [[ "$IMAGE_TAG" == *"-quic" ]]; then
            docker run -d --name unbound-dns -p 5335:5335/udp "$IMAGE_TAG" || true
          else
            docker run -d --name unbound-dns -p 5335:5335/udp "$IMAGE_TAG"
          fi

      - name: Wait for Unbound readiness
        run: |
          for _ in {1..20}; do
            if docker logs unbound-dns 2>&1 | grep -q "start of service"; then
              exit 0
            fi
            sleep 1
          done
          docker logs unbound-dns
          exit 1

      - name: DNS test
        run: |
          if [[ "$IMAGE_TAG" == *"-quic" ]]; then
            timeout 10s docker exec unbound-dns drill cloudflare.com A || true
          else
            timeout 10s docker exec unbound-dns drill cloudflare.com A
          fi

      - name: Cleanup
        if: always()
        run: docker rm -f unbound-dns || true
