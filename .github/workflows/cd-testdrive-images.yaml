name: CD Testdrive Unbound Docker Images

on:
  workflow_run:
    workflows:
      - CD Build Unbound Docker Image
      - CD Build Unbound QUIC Docker Image
      - CD Build Canary Unbound Docker Image
      - CD Build Canary Unbound QUIC Docker Image
    types:
      - completed

permissions:
  actions: read
  checks: write
  contents: read

jobs:
  test-image:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with:
          egress-policy: audit
          
####################
          
      - name: Debug: List artifacts in this run
        run: |
          echo "Listing artifacts via API:"
          gh api "/repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/artifacts" \
            --jq '.artifacts[] | {name, id, size_in_bytes}'

      - name: Debug: Try manual artifact download
        run: |
          echo "Attempting manual download..."
          gh run download ${{ github.event.workflow_run.id }} \
            -n unbound-build-metadata \
            -D debug-artifact || echo "Manual download failed"
          echo "Listing downloaded files:"
          ls -R debug-artifact || echo "No files downloaded"

#################

      - name: Download metadata artifact (non-QUIC)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: unbound-build-metadata
          path: metadata
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      - name: Download metadata artifact (QUIC)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: unbound-quic-build-metadata
          path: metadata
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      - name: Ensure metadata exists
        run: |
          if [ ! -f metadata/variant.txt ]; then
            echo "No metadata artifact found for this workflow run."
            exit 1
          fi

      - name: Detect variant
        run: |
          VARIANT="$(cat metadata/variant.txt)"
          echo "VARIANT=$VARIANT" >> "$GITHUB_ENV"

      - name: Determine image tag
        run: |
          case "$VARIANT" in
            stable)
              echo "IMAGE_TAG=madnuttah/unbound:latest" >> "$GITHUB_ENV"
              ;;
            stable-quic)
              echo "IMAGE_TAG=madnuttah/unbound:latest-quic" >> "$GITHUB_ENV"
              ;;
            canary)
              echo "IMAGE_TAG=madnuttah/unbound:canary" >> "$GITHUB_ENV"
              ;;
            canary-quic)
              echo "IMAGE_TAG=madnuttah/unbound:canary-quic" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unknown variant: $VARIANT"
              exit 1
              ;;
          esac

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull image
        run: docker pull "$IMAGE_TAG" || true

      - name: Start container
        run: |
          if [[ "$IMAGE_TAG" == *"-quic" ]]; then
            docker run -d --name unbound-dns -p 5335:5335/udp "$IMAGE_TAG" || true
          else
            docker run -d --name unbound-dns -p 5335:5335/udp "$IMAGE_TAG"
          fi

      - name: Wait for Unbound readiness
        run: |
          for _ in {1..20}; do
            if docker logs unbound-dns 2>&1 | grep -q "start of service"; then
              exit 0
            fi
            sleep 1
          done
          docker logs unbound-dns
          exit 1

      - name: DNS test
        run: |
          timeout 10s docker exec unbound-dns drill cloudflare.com A || true

      - name: Cleanup
        if: always()
        run: docker rm -f unbound-dns || true
