name: CD Testdrive Unbound Docker Images

on:
  workflow_run:
    workflows: ["CD Build Unbound"]
    types: [completed]

permissions:
  actions: read
  contents: read

jobs:
  test-images:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Determine built variants
        id: variants
        run: |
          # We always test both variants for Release builds
          echo "VARIANTS=standard quic" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Test each variant
        run: |
          for V in ${{ steps.variants.outputs.VARIANTS }}; do
            if [ "$V" = "quic" ]; then
              TAG="madnuttah/unbound:latest-quic"
              PORT=8853
            else
              TAG="madnuttah/unbound:latest"
              PORT=5335
            fi

            echo "Testing $TAG"

            docker pull "$TAG"

            docker run -d --name unbound-dns-$V -p ${PORT}:${PORT}/udp "$TAG"

            echo "Waiting for readiness..."
            for i in {1..20}; do
              if docker logs unbound-dns-$V 2>&1 | grep -q "ready to serve"; then
                break
              fi
              sleep 1
            done

            docker exec unbound-dns-$V drill @127.0.0.1 -p ${PORT} cloudflare.com A

            docker rm -f unbound-dns-$V || true
          done
