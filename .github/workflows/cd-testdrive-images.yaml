name: CD Testdrive Unbound Docker Images

on:
  workflow_run:
    workflows:
      - CD Build Unbound Docker Image
      - CD Build Unbound QUIC Docker Image
      - CD Build Canary Unbound Docker Image
      - CD Build Canary Unbound QUIC Docker Image
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  test-image:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      (
        github.event.workflow_run.workflow_name == 'CD Build Unbound Docker Image' ||
        github.event.workflow_run.workflow_name == 'CD Build Unbound QUIC Docker Image' ||
        github.event.workflow_run.workflow_name == 'CD Build Canary Unbound Docker Image' ||
        github.event.workflow_run.workflow_name == 'CD Build Canary Unbound QUIC Docker Image'
      )

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with:
          egress-policy: audit

      - name: Download variant
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: variant
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Determine image tag
        run: |
          VARIANT=$(cat variant/variant.txt)

          case "$VARIANT" in
            stable)
              echo "IMAGE_TAG=madnuttah/unbound:latest" >> "$GITHUB_ENV"
              ;;
            stable-quic)
              echo "IMAGE_TAG=madnuttah/unbound:latest-quic" >> "$GITHUB_ENV"
              ;;
            canary)
              echo "IMAGE_TAG=madnuttah/unbound:canary" >> "$GITHUB_ENV"
              ;;
            canary-quic)
              echo "IMAGE_TAG=madnuttah/unbound:canary-quic" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unknown variant: $VARIANT"
              exit 1
              ;;
          esac

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull image
        run: docker pull "$IMAGE_TAG" || true

      - name: Start container
        run: |
          if [[ "$IMAGE_TAG" == *"-quic" ]]; then
            docker run -d --name unbound-dns -p 5335:5335/udp "$IMAGE_TAG" || true
          else
            docker run -d --name unbound-dns -p 5335:5335/udp "$IMAGE_TAG"
          fi
          
      - name: Wait for Unbound readiness
        run: |
          for i in {1..20}; do
            : "$i"
            if docker logs unbound-dns 2>&1 | grep -q "start of service"; then
              exit 0
            fi
            sleep 1
          done
          docker logs unbound-dns
          exit 1

      - name: DNS test
        run: |
          if [[ "$IMAGE_TAG" == *"-quic" ]]; then
            timeout 10s docker exec unbound-dns drill cloudflare.com A || true
          else
            timeout 10s docker exec unbound-dns drill cloudflare.com A
          fi

      - name: Cleanup
        if: always()
        run: docker rm -f unbound-dns || true
