name: CD Tag And Release

on:
  workflow_run:
    workflows:
      - "CD Publish Unbound Manifests"
    types:
      - completed

permissions:
  actions: read
  checks: write
  contents: write

jobs:
  tag_and_release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with:
          egress-policy: audit

      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          
      - name: Resolve Root Build Workflow Run ID
        id: resolve_id
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          TARGET_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          MANIFEST_RUN_ID="${{ github.event.workflow_run.id }}"
          PREVIOUS_URL=$(gh api "repos/$TARGET_REPO/actions/runs/$MANIFEST_RUN_ID" --jq '.previous_attempt_url // empty')
          
          BUILD_RUN_ID=""
          
          if [ -n "$PREVIOUS_URL" ]; then
            BUILD_RUN_ID=$(echo "$PREVIOUS_URL" | grep -oE '[0-9]+$' | tail -1)
          else
            echo "Using fallback search via API..."
            
            WORKFLOWS=(
              "CD Build Unbound Docker Image"
              "CD Build Unbound QUIC Docker Image"
            )
            
            for wf in "${WORKFLOWS[@]}"; do
              ID=$(gh run list --repo "$TARGET_REPO" --workflow="$wf" --status=success --limit=1 --json databaseId --jq '.[0].databaseId')
              
              if [ "$ID" = "null" ] || [ -z "$ID" ]; then
                ID=""
              fi
              
              if [ -n "$ID" ]; then
                BUILD_RUN_ID="$ID"
                break
              fi
            done
          fi
          
          if [ -z "$BUILD_RUN_ID" ]; then
            echo "Error: Could not resolve root build run ID." >&2
            exit 1
          fi
          
          echo "Resolved Root Build Run ID: $BUILD_RUN_ID"
          echo "BUILD_RUN_ID=$BUILD_RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Download metadata artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: unbound-build-metadata
          path: metadata
          run-id: ${{ steps.resolve_id.outputs.BUILD_RUN_ID }}
          github-token: ${{ secrets.BOT_GITHUB_TOKEN }}

      - name: Detect variant
        id: detect
        run: |
          if [ ! -f metadata/variant.txt ]; then
            echo "No metadata artifact found for this workflow run."
            exit 1
          fi
          
          VARIANT="$(cat metadata/variant.txt)"
          echo "VARIANT=$VARIANT" >> "$GITHUB_ENV"
          
          if [[ "$VARIANT" == canary* ]]; then
            echo "IS_CANARY=true" >> "$GITHUB_OUTPUT"
          else
            echo "IS_CANARY=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify Tag and Release eligibility
        if: ${{ steps.detect.outputs.IS_CANARY == 'true' }}
        run: |
          echo "Canary variant detected. Skipping tagging and release creations."

      - name: Import GPG key
        if: ${{ steps.detect.outputs.IS_CANARY != 'true' }}
        id: IMPORT_GPG
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_tag_gpgsign: true
          git_push_gpgsign: false
          trust_level: 5
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}

      - name: Push tag and upload release to GitHub
        if: ${{ steps.detect.outputs.IS_CANARY != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: ${{ steps.IMPORT_GPG.outputs.name }}
          GIT_AUTHOR_EMAIL: ${{ steps.IMPORT_GPG.outputs.email }}
          GIT_COMMITTER_NAME: ${{ steps.IMPORT_GPG.outputs.name }}
          GIT_COMMITTER_EMAIL: ${{ steps.IMPORT_GPG.outputs.email }}
        run: |
          set -euo pipefail
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@://github.com{GITHUB_REPOSITORY}"

          case "$VARIANT" in
            stable)
              UNBOUND_VERSION="$(cat versions/unbound.txt)"
              UNBOUND_DOCKER_VERSION="$(cat versions/unbound-docker-image.txt)"
              ;;
            stable-quic)
              UNBOUND_VERSION="$(cat versions/unbound-quic.txt)"
              UNBOUND_DOCKER_VERSION="$(cat versions/unbound-quic-docker-image.txt)"
              ;;
            *)
              echo "Unknown or unhandled variant for release: $VARIANT" >&2
              exit 1
              ;;
          esac

          RELEASE_TAG="v${UNBOUND_DOCKER_VERSION}"

          git fetch --all --tags
          if git rev-parse "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_TAG} already exists."
            exit 1
          fi

          WHATS_NEW="* Updated Unbound to version ${UNBOUND_VERSION}\n* QUIC build is currently building…"

          git tag -a "${RELEASE_TAG}" -m "${RELEASE_TAG}"
          git push -u origin "${RELEASE_TAG}"

          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${RELEASE_TAG}$" | head -n 1)

          CURRENT=$(git log "${PREV_TAG}..${RELEASE_TAG}" --format="%aN|%aE" | sort -u || true)
          ALL_PREVIOUS=$(git log --format="%aN|%aE" "${PREV_TAG}" --all | sort -u || true)

          FILTERED_CURRENT=$(echo "$CURRENT" | while IFS='|' read -r NAME EMAIL; do
            LOWER=$(echo "$NAME" | tr '[:upper:]' '[:lower:]')
            if echo "$LOWER" | grep -Eq "github-actions|madnuttah-bot|dependabot"; then
              continue
            fi
            echo "$NAME|$EMAIL"
          done)

          NEW_CONTRIB=$(echo "$FILTERED_CURRENT" | while IFS='|' read -r NAME EMAIL; do
            if ! echo "$ALL_PREVIOUS" | grep -q "|$EMAIL$"; then
              echo "$NAME|$EMAIL"
            fi
          done)

          if [ -n "$NEW_CONTRIB" ]; then
            NEW_CONTRIB_MD=$(echo "$NEW_CONTRIB" | while IFS='|' read -r NAME EMAIL; do
              USER=$(curl -s "https://github.com" | jq -r '.items[0].login // empty')
              if [ -n "$USER" ]; then
                echo "- @$USER"
              else
                echo "- $NAME"
              fi
            done)
            NEW_CONTRIB_SECTION=$(printf "## New contributors\n%s\n\n" "$NEW_CONTRIB_MD")
          else
            NEW_CONTRIB_SECTION=""
          fi

          RELEASE_NOTE=$(printf "## %s <madnuttah-bot>\n\n## What's new?\n%s\n\n%sNLnet Labs Unbound changelog: https://github.com\n" \
            "$(date '+%Y-%m-%d')" "$WHATS_NEW" "$NEW_CONTRIB_SECTION" "$UNBOUND_VERSION")

          git checkout -b "${UNBOUND_DOCKER_VERSION}" "${RELEASE_TAG}"
          git push --set-upstream origin "${UNBOUND_DOCKER_VERSION}"

          gh release create "${RELEASE_TAG}" -t "${UNBOUND_DOCKER_VERSION}" -n "${RELEASE_NOTE}" --latest