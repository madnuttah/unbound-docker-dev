name: CD Build Canary Unbound QUIC Docker Image

on:
  workflow_run:
    workflows: ["CD Build Canary Distroless Unbound Docker Image"]
    types:
      - completed
  workflow_dispatch:

permissions: {}

jobs:

  check-update:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

  build:
    needs: check-update
    runs-on: ubuntu-latest

    env:
      DOCKERHUB_SLUG: "madnuttah/unbound-edev"
      UNBOUND_DOCKER_IMAGE_VERSION: "canary-quic"

    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
        with:
         # persist-credentials: false
          fetch-depth: 0

      - name: Set buildvars
        id: vars
        run: |
          echo "IMAGE_BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"

          VERSION="$(curl -s https://raw.githubusercontent.com/NLnetLabs/unbound/master/configure | awk -F= '/^version=/ { print $2 }')"
          echo "UNBOUND_VERSION=$VERSION" >> "$GITHUB_OUTPUT"

          OPENSSL="$(curl -s https://api.github.com/repos/madnuttah/openssl-buildenv/releases | jq -r '[.[] | select(.prerelease == false)][0].name')"
          echo "OPENSSL_QUIC_BUILDENV_VERSION=${OPENSSL}-quic" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3
        id: buildx

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_SLUG }}
            ${{ env.GHCR_SLUG }}
          tags: |
            type=raw,value=${{ env.UNBOUND_DOCKER_IMAGE_VERSION }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64,linux/386,linux/arm/v6,linux/arm/v7,linux/ppc64le,linux/s390x,linux/riscv64
          builder: ${{ steps.buildx.outputs.name }}

          build-args: |
            OPENSSL_QUIC_BUILDENV_VERSION=${{ steps.vars.outputs.OPENSSL_QUIC_BUILDENV_VERSION }}
            IMAGE_BUILD_DATE=${{ steps.vars.outputs.IMAGE_BUILD_DATE }}
            UNBOUND_VERSION=${{ steps.vars.outputs.UNBOUND_VERSION }}

          file: ./unbound/canary_quic.Dockerfile

          push: true
          sbom: true
          provenance: true

          cache-from: |
            type=registry,ref=madnuttah/unbound:buildcache-canary-quic

          cache-to: |
            type=registry,ref=madnuttah/unbound:buildcache-canary-quic,mode=max

          tags: |
            ${{ env.DOCKERHUB_SLUG }}:canary-quic

      - uses: aquasecurity/trivy-action@master
        if: ${{ github.event_name != 'pull_request' }}
        with:
          image-ref: ${{ env.DOCKERHUB_SLUG }}:canary-quic
          exit-code: "1"
          ignore-unfixed: false
          scan-type: image
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
          format: "table"

      - uses: docker/scout-action@v1
        if: ${{ github.event_name != 'pull_request' }}
        with:
          command: cves
          image: ${{ env.DOCKERHUB_SLUG }}:canary-quic
          only-fixed: true
          only-severities: critical,high
          write-comment: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          exit-code: false
