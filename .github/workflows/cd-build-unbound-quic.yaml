name: CD Build Unbound QUIC Docker Image

on:
  push:
    paths:
      - "versions/unbound.txt"
      - "versions/openssl-quic-buildenv.txt"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  packages: write
  id-token: write

jobs:
  buildvars:
    runs-on: ubuntu-latest
    outputs:
      IMAGE_BUILD_DATE: "${{ steps.vars.outputs.IMAGE_BUILD_DATE }}"
      UNBOUND_VERSION: "${{ steps.vars.outputs.UNBOUND_VERSION }}"
      UNBOUND_SHA256: "${{ steps.vars.outputs.UNBOUND_SHA256 }}"
      OPENSSL_QUIC_BE: "${{ steps.vars.outputs.OPENSSL_QUIC_BE }}"
      OPENSSL_QUIC_SUB: "${{ steps.vars.outputs.OPENSSL_QUIC_SUB }}"
      OPENSSL_QUIC_BUILDENV_VERSION: "${{ steps.vars.outputs.OPENSSL_QUIC_BUILDENV_VERSION }}"
      UNBOUND_QUIC_IMAGE_VERSION: "${{ steps.vars.outputs.UNBOUND_QUIC_IMAGE_VERSION }}"

    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Load versions and fetch SHA256
        id: vars
        run: |
          set -euo pipefail

          UNBOUND_VERSION=$(cat versions/unbound.txt)

          SHA_URL="https://github.com/NLnetLabs/unbound/releases/download/${UNBOUND_VERSION}/${UNBOUND_VERSION}.tar.gz.sha256"

          if ! curl --fail -sL "$SHA_URL" >/dev/null; then
            printf "ERROR: SHA256 file not found for %s\n" "${UNBOUND_VERSION}" >&2
            exit 1
          fi

          UNBOUND_SHA256=$(curl -sL "$SHA_URL" | awk '{print $1}')

          OPENSSL_QUIC_BE=$(grep '^openssl=' versions/openssl-quic-buildenv.txt | cut -d= -f2)
          OPENSSL_QUIC_SUB=$(grep '^sub=' versions/openssl-quic-buildenv.txt | cut -d= -f2)
          OPENSSL_QUIC_BUILDENV_VERSION="${OPENSSL_QUIC_BE}-${OPENSSL_QUIC_SUB}-quic"

          UNBOUND_QUIC_IMAGE_VERSION="${UNBOUND_VERSION}-${OPENSSL_QUIC_SUB}"

          {
            echo "IMAGE_BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo "UNBOUND_VERSION=${UNBOUND_VERSION}"
            echo "UNBOUND_SHA256=${UNBOUND_SHA256}"
            echo "OPENSSL_QUIC_BE=${OPENSSL_QUIC_BE}"
            echo "OPENSSL_QUIC_SUB=${OPENSSL_QUIC_SUB}"
            echo "OPENSSL_QUIC_BUILDENV_VERSION=${OPENSSL_QUIC_BUILDENV_VERSION}"
            echo "UNBOUND_QUIC_IMAGE_VERSION=${UNBOUND_QUIC_IMAGE_VERSION}"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: buildvars
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    env:
      DOCKERHUB_SLUG: "madnuttah/unbound-dev"

    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
        id: buildx

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        if: github.event_name != 'pull_request'
        with:
          username: "${{ secrets.DOCKERHUB_USERNAME }}"
          password: "${{ secrets.DOCKERHUB_TOKEN }}"

      - name: Build and push QUIC image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          builder: "${{ steps.buildx.outputs.name }}"
          file: "unbound/release_quic.Dockerfile"

          platforms: |
            linux/amd64,linux/arm64,linux/386,
            linux/arm/v6,linux/arm/v7,
            linux/ppc64le,linux/s390x,linux/riscv64

          push: ${{ github.event_name != 'pull_request' }}
          sbom: ${{ github.event_name != 'pull_request' }}
          provenance: ${{ github.event_name != 'pull_request' }}

          build-args: |
            IMAGE_BUILD_DATE=${{ needs.buildvars.outputs.IMAGE_BUILD_DATE }}
            UNBOUND_VERSION=${{ needs.buildvars.outputs.UNBOUND_VERSION }}
            UNBOUND_SHA256=${{ needs.buildvars.outputs.UNBOUND_SHA256 }}
            UNBOUND_DOCKER_IMAGE_VERSION=${{ needs.buildvars.outputs.UNBOUND_QUIC_IMAGE_VERSION }}
            OPENSSL_BUILDENV_VERSION=${{ needs.buildvars.outputs.OPENSSL_QUIC_BUILDENV_VERSION }}

          cache-from: |
            type=registry,ref=${{ env.DOCKERHUB_SLUG }}:buildcache-quic

          cache-to: |
            type=registry,ref=${{ env.DOCKERHUB_SLUG }}:buildcache-quic,mode=max

          tags: |
            ${{ env.DOCKERHUB_SLUG }}:${{ needs.buildvars.outputs.UNBOUND_QUIC_IMAGE_VERSION }}-quic
            ${{ env.DOCKERHUB_SLUG }}:latest-quic