name: CD Build Unbound Docker Image

on:
  push:
    branches:
      - main
    paths:
      - "versions/unbound.txt"
      - "versions/openssl-buildenv.txt"

concurrency:
  group: cd-build-unbound
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  packages: write
  id-token: write

jobs:
  buildvars:
    if: github.actor == 'renovate[bot]'
    runs-on: ubuntu-latest
    outputs:
      IMAGE_BUILD_DATE: "${{ steps.vars.outputs.IMAGE_BUILD_DATE }}"
      UNBOUND_VERSION: "${{ steps.vars.outputs.UNBOUND_VERSION }}"
      UNBOUND_SHA256: "${{ steps.vars.outputs.UNBOUND_SHA256 }}"
      OPENSSL_BUILDENV_VERSION: "${{ steps.vars.outputs.OPENSSL_BUILDENV_VERSION }}"
      UNBOUND_IMAGE_VERSION: "${{ steps.vars.outputs.UNBOUND_IMAGE_VERSION }}"

    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Load versions and fetch SHA256
        id: vars
        run: |
          set -euo pipefail

          UNBOUND_VERSION=$(cat versions/unbound.txt)

          SHA_URL="https://nlnetlabs.nl/downloads/unbound/unbound-${UNBOUND_VERSION}.tar.gz.sha256"

          if ! curl --fail -sL "$SHA_URL" >/dev/null; then
            printf "ERROR: SHA256 file not found for %s\n" "${UNBOUND_VERSION}" >&2
            exit 1
          fi

          UNBOUND_SHA256=$(curl -sL "$SHA_URL" | awk '{print $1}')

          OPENSSL_BUILDENV_VERSION=$(grep '^OPENSSL_BUILDENV_VERSION=' versions/openssl-buildenv.txt | cut -d= -f2)

          UNBOUND_SUB=$(grep '^sub=' versions/unbound-docker-image.txt | cut -d= -f2)
          UNBOUND_IMAGE_VERSION="${UNBOUND_VERSION}-${UNBOUND_SUB}"

          {
            echo "IMAGE_BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo "UNBOUND_VERSION=${UNBOUND_VERSION}"
            echo "UNBOUND_SHA256=${UNBOUND_SHA256}"
            echo "OPENSSL_BUILDENV_VERSION=${OPENSSL_BUILDENV_VERSION}"
            echo "UNBOUND_IMAGE_VERSION=${UNBOUND_IMAGE_VERSION}"
          } >> "$GITHUB_OUTPUT"

      - name: Show build variables
        run: |
          echo "IMAGE_BUILD_DATE=${{ steps.vars.outputs.IMAGE_BUILD_DATE }}"
          echo "UNBOUND_VERSION=${{ steps.vars.outputs.UNBOUND_VERSION }}"
          echo "UNBOUND_SHA256=${{ steps.vars.outputs.UNBOUND_SHA256 }}"
          echo "OPENSSL_BUILDENV_VERSION=${{ steps.vars.outputs.OPENSSL_BUILDENV_VERSION }}"
          echo "UNBOUND_IMAGE_VERSION=${{ steps.vars.outputs.UNBOUND_IMAGE_VERSION }}"

  build:
    if: github.actor == 'renovate[bot]'
    needs: buildvars
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
          - linux/386
          - linux/arm/v6
          - linux/arm/v7
          - linux/ppc64le
          - linux/s390x
          - linux/riscv64

    permissions:
      contents: read
      packages: write
      id-token: write

    env:
      DOCKERHUB_SLUG: "madnuttah/unbound-dev"

    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
        id: buildx

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        if: github.event_name != 'pull_request'
        with:
          username: "${{ secrets.DOCKERHUB_USERNAME }}"
          password: "${{ secrets.DOCKERHUB_TOKEN }}"

      - name: Build and push release image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          builder: "${{ steps.buildx.outputs.name }}"
          file: "unbound/release.Dockerfile"

          platforms: ${{ matrix.platform }}

          push: ${{ github.event_name != 'pull_request' }}
          sbom: ${{ github.event_name != 'pull_request' }}
          provenance: ${{ github.event_name != 'pull_request' }}

          build-args: |
            IMAGE_BUILD_DATE=${{ needs.buildvars.outputs.IMAGE_BUILD_DATE }}
            UNBOUND_VERSION=${{ needs.buildvars.outputs.UNBOUND_VERSION }}
            UNBOUND_SHA256=${{ needs.buildvars.outputs.UNBOUND_SHA256 }}
            UNBOUND_DOCKER_IMAGE_VERSION=${{ needs.buildvars.outputs.UNBOUND_IMAGE_VERSION }}
            OPENSSL_BUILDENV_VERSION=${{ needs.buildvars.outputs.OPENSSL_BUILDENV_VERSION }}

          cache-from: |
            type=registry,ref=${{ env.DOCKERHUB_SLUG }}:buildcache-${{ matrix.platform }}

          cache-to: |
            type=registry,ref=${{ env.DOCKERHUB_SLUG }}:buildcache-${{ matrix.platform }},mode=max

          tags: |
            ${{ env.DOCKERHUB_SLUG }}:${{ needs.buildvars.outputs.UNBOUND_IMAGE_VERSION }}
            ${{ env.DOCKERHUB_SLUG }}:latest
