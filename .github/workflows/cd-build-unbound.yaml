name: CD Build Unbound

on:
  workflow_dispatch:
    inputs:
      subversion:
        description: "Subversion bump (required)"
        required: true
        type: string

  push:
    branches: [ main ]
    paths:
      - "versions/**"

permissions: {}

jobs:

  update-sha-start:
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: Import GPG key
        id: IMPORT_GPG
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Fetch latest upstream HEAD
        id: fetch
        run: |
          UNBOUND_GIT_SHA="$(git ls-remote https://github.com/NLnetLabs/unbound.git HEAD | cut -f1)"
          echo "UNBOUND_GIT_SHA=$UNBOUND_GIT_SHA" >> $GITHUB_OUTPUT

      - name: Push updated unbound_git_sha
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          NEW_SHA: ${{ steps.fetch.outputs.UNBOUND_GIT_SHA }}
        run: |
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}"
          echo "$NEW_SHA" > unbound_git_sha
          git add unbound_git_sha
          git commit -m "Updated unbound_git_sha (release start)" || true
          git push origin main || true


  buildvars:
    needs: update-sha-start
    runs-on: ubuntu-latest
    outputs:
      IMAGE_BUILD_DATE: ${{ steps.date.outputs.IMAGE_BUILD_DATE }}
      UNBOUND_VERSION: ${{ steps.vars.outputs.UNBOUND_VERSION }}
      UNBOUND_SHA256: ${{ steps.vars.outputs.UNBOUND_SHA256 }}
      OPENSSL_BUILDENV_VERSION: ${{ steps.vars.outputs.OPENSSL_BUILDENV_VERSION }}
      OPENSSL_QUIC_BUILDENV_VERSION: ${{ steps.vars.outputs.OPENSSL_QUIC_BUILDENV_VERSION }}
      UNBOUND_DOCKER_IMAGE_VERSION: ${{ steps.vars.outputs.UNBOUND_DOCKER_IMAGE_VERSION }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with:
          egress-policy: audit

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: Set IMAGE_BUILD_DATE
        id: date
        run: echo "IMAGE_BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Read version files
        id: vars
        run: |
          UNBOUND_VERSION=$(cat versions/unbound.txt)
          UNBOUND_SHA256=$(cat versions/unbound-sha256.txt)
          OPENSSL_BUILDENV_VERSION=$(cat versions/openssl.txt)
          OPENSSL_QUIC_BUILDENV_VERSION=$(cat versions/openssl-quic.txt)

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SUB="${{ github.event.inputs.subversion }}"
          else
            SUB="0"
          fi

          UNBOUND_DOCKER_IMAGE_VERSION="${UNBOUND_VERSION}-${SUB}"

          {
            echo "UNBOUND_VERSION=$UNBOUND_VERSION"
            echo "UNBOUND_SHA256=$UNBOUND_SHA256"
            echo "OPENSSL_BUILDENV_VERSION=$OPENSSL_BUILDENV_VERSION"
            echo "OPENSSL_QUIC_BUILDENV_VERSION=$OPENSSL_QUIC_BUILDENV_VERSION"
            echo "UNBOUND_DOCKER_IMAGE_VERSION=$UNBOUND_DOCKER_IMAGE_VERSION"
          } >> $GITHUB_OUTPUT


  build:
    needs: buildvars
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        variant: [standard, quic]
        arch: [amd64, arm64, 386, armv6, armv7, ppc64le, s390x, riscv64]

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176
        with:
          egress-policy: audit

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        env:
          DOCKERHUB_SLUG: "madnuttah/unbound"
        with:
          builder: ${{ steps.buildx.outputs.name }}
          platforms: linux/${{ matrix.arch }}

          file: ${{ matrix.variant == 'quic' && 'unbound/release_quic.Dockerfile' || 'unbound/release.Dockerfile' }}

          build-args: |
            IMAGE_BUILD_DATE=${{ needs.buildvars.outputs.IMAGE_BUILD_DATE }}
            UNBOUND_VERSION=${{ needs.buildvars.outputs.UNBOUND_VERSION }}
            UNBOUND_SHA256=${{ needs.buildvars.outputs.UNBOUND_SHA256 }}
            UNBOUND_DOCKER_IMAGE_VERSION=${{ needs.buildvars.outputs.UNBOUND_DOCKER_IMAGE_VERSION }}
            OPENSSL_BUILDENV_VERSION=${{ matrix.variant == 'standard' && needs.buildvars.outputs.OPENSSL_BUILDENV_VERSION || '' }}
            OPENSSL_QUIC_BUILDENV_VERSION=${{ matrix.variant == 'quic' && needs.buildvars.outputs.OPENSSL_QUIC_BUILDENV_VERSION || '' }}

          cache-from: |
            type=registry,ref=madnuttah/unbound:buildcache-${{ matrix.variant }}-${{ matrix.arch }}

          cache-to: |
            type=registry,ref=madnuttah/unbound:buildcache-${{ matrix.variant }}-${{ matrix.arch }},mode=max

          push: true
          sbom: true
          provenance: true

          tags: |
            madnuttah/unbound:${{ needs.buildvars.outputs.UNBOUND_DOCKER_IMAGE_VERSION }}${{ matrix.variant == 'quic' && '-quic' || '' }}
            madnuttah/unbound:${{ matrix.variant == 'quic' && 'latest-quic' || 'latest' }}
