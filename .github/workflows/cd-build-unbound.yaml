name: CD Build Unbound Docker Image

on:
  push:
    paths:
      - "versions/unbound.txt"
      - "versions/openssl-buildenv.txt"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  packages: write
  id-token: write

jobs:
  buildvars:
    runs-on: ubuntu-latest
    outputs:
      IMAGE_BUILD_DATE: "${{ steps.vars.outputs.IMAGE_BUILD_DATE }}"
      UNBOUND_VERSION: "${{ steps.vars.outputs.UNBOUND_VERSION }}"
      UNBOUND_SHA256: "${{ steps.vars.outputs.UNBOUND_SHA256 }}"
      OPENSSL_BE: "${{ steps.vars.outputs.OPENSSL_BE }}"
      OPENSSL_SUB: "${{ steps.vars.outputs.OPENSSL_SUB }}"
      OPENSSL_BUILDENV_VERSION: "${{ steps.vars.outputs.OPENSSL_BUILDENV_VERSION }}"
      UNBOUND_IMAGE_VERSION: "${{ steps.vars.outputs.UNBOUND_IMAGE_VERSION }}"

    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Load versions and fetch SHA256
        id: vars
        run: |
          set -euo pipefail
          
          echo "IMAGE_BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"
          
          UNBOUND_VERSION=$(cat versions/unbound.txt)
          echo "UNBOUND_VERSION=${UNBOUND_VERSION}" >> "$GITHUB_OUTPUT"
          
          # Fetch SHA256 from release
          SHA_URL="https://github.com/NLnetLabs/unbound/releases/download/${UNBOUND_VERSION}/${UNBOUND_VERSION}.tar.gz.sha256"
          
          if ! curl --fail -sL "$SHA_URL" >/dev/null; then
            printf "ERROR: SHA256 file not found for %s\n" "${UNBOUND_VERSION}" >&2
            exit 1
          fi
          
          UNBOUND_SHA256=$(curl -sL "$SHA_URL" | awk '{print $1}')
          echo "UNBOUND_SHA256=${UNBOUND_SHA256}" >> "$GITHUB_OUTPUT"
          
          OPENSSL_BE=$(grep '^openssl=' versions/openssl-buildenv.txt | cut -d= -f2)
          OPENSSL_SUB=$(grep '^sub=' versions/openssl-buildenv.txt | cut -d= -f2)
          OPENSSL_BUILDENV_VERSION="${OPENSSL_BE}-${OPENSSL_SUB}"
          
          echo "OPENSSL_BE=${OPENSSL_BE}" >> "$GITHUB_OUTPUT"
          echo "OPENSSL_SUB=${OPENSSL_SUB}" >> "$GITHUB_OUTPUT"
          echo "OPENSSL_BUILDENV_VERSION=${OPENSSL_BUILDENV_VERSION}" >> "$GITHUB_OUTPUT"
          
          UNBOUND_IMAGE_VERSION="${UNBOUND_VERSION}-${OPENSSL_SUB}"
          echo "UNBOUND_IMAGE_VERSION=${UNBOUND_IMAGE_VERSION}" >> "$GITHUB_OUTPUT"

  build:
    needs: buildvars
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    env:
      DOCKERHUB_SLUG: "madnuttah/unbound-dev"

    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3
        id: buildx

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          username: "${{ secrets.DOCKERHUB_USERNAME }}"
          password: "${{ secrets.DOCKERHUB_TOKEN }}"

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          builder: "${{ steps.buildx.outputs.name }}"
          file: "unbound/release.Dockerfile"

          platforms: |
            linux/amd64,linux/arm64,linux/386,
            linux/arm/v6,linux/arm/v7,
            linux/ppc64le,linux/s390x,linux/riscv64

          push: ${{ github.event_name != 'pull_request' }}
          sbom: ${{ github.event_name != 'pull_request' }}
          provenance: ${{ github.event_name != 'pull_request' }}

          build-args: |
            IMAGE_BUILD_DATE=${{ needs.buildvars.outputs.IMAGE_BUILD_DATE }}
            UNBOUND_VERSION=${{ needs.buildvars.outputs.UNBOUND_VERSION }}
            UNBOUND_SHA256=${{ needs.buildvars.outputs.UNBOUND_SHA256 }}
            UNBOUND_DOCKER_IMAGE_VERSION=${{ needs.buildvars.outputs.UNBOUND_IMAGE_VERSION }}
            OPENSSL_BUILDENV_VERSION=${{ needs.buildvars.outputs.OPENSSL_BUILDENV_VERSION }}

          cache-from: |
            type=registry,ref=${{ env.DOCKERHUB_SLUG }}:buildcache

          cache-to: |
            type=registry,ref=${{ env.DOCKERHUB_SLUG }}:buildcache,mode=max

          tags: |
            ${{ env.DOCKERHUB_SLUG }}:${{ needs.buildvars.outputs.UNBOUND_IMAGE_VERSION }}
            ${{ env.DOCKERHUB_SLUG }}:latest