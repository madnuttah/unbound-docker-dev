name: CD Build Unbound

on:
  workflow_dispatch:
    inputs:
      SUBVERSION:
        description: "Required subversion number for manual builds"
        required: true
        default: ""

  push:
    paths:
      - "versions/unbound.txt"
      - "versions/openssl.txt"
      - "versions/openssl-quic.txt"

permissions: {}

jobs:
  buildvars:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'

    outputs:
      IMAGE_BUILD_DATE: "${{ steps.vars.outputs.IMAGE_BUILD_DATE }}"
      UNBOUND_VERSION: "${{ steps.vars.outputs.UNBOUND_VERSION }}"
      UNBOUND_SHA256: "${{ steps.vars.outputs.UNBOUND_SHA256 }}"
      OPENSSL_BUILDENV_VERSION: "${{ steps.vars.outputs.OPENSSL_BUILDENV_VERSION }}"
      OPENSSL_QUIC_BUILDENV_VERSION: "${{ steps.vars.outputs.OPENSSL_QUIC_BUILDENV_VERSION }}"
      UNBOUND_DOCKER_IMAGE_VERSION: "${{ steps.vars.outputs.UNBOUND_DOCKER_IMAGE_VERSION }}"
      SUBVERSION: "${{ steps.vars.outputs.SUBVERSION }}"

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          token: "${{ secrets.BOT_GITHUB_TOKEN }}"
          persist-credentials: false
          fetch-depth: 0

      - name: Import GPG key
        id: IMPORT_GPG
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: "${{ secrets.BOT_GPG_PRIVATE_KEY }}"
          passphrase: "${{ secrets.BOT_GPG_PASSPHRASE }}"
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Fetch latest upstream HEAD
        id: fetch
        run: |
          UNBOUND_GIT_SHA="$(git ls-remote https://github.com/NLnetLabs/unbound.git HEAD | cut -f1)"
          echo "UNBOUND_GIT_SHA=$UNBOUND_GIT_SHA" >> "$GITHUB_OUTPUT"

      - name: Push updated unbound_git_sha
        env:
          GITHUB_TOKEN: "${{ secrets.BOT_GITHUB_TOKEN }}"
          NEW_SHA: "${{ steps.fetch.outputs.UNBOUND_GIT_SHA }}"
        run: |
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}"
          echo "$NEW_SHA" > versions/unbound-git-sha.txt
          git add versions/unbound-git-sha.txt
          git commit -m "Updated unbound_git_sha (auto)" || true
          git push origin main || true

      - name: Load versions
        id: vars
        run: |
          echo "IMAGE_BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"
          echo "UNBOUND_VERSION=$(cat versions/unbound.txt)" >> "$GITHUB_OUTPUT"
          echo "UNBOUND_SHA256=$(cat versions/unbound-sha256.txt)" >> "$GITHUB_OUTPUT"
          echo "OPENSSL_BUILDENV_VERSION=$(cat versions/openssl.txt)" >> "$GITHUB_OUTPUT"
          echo "OPENSSL_QUIC_BUILDENV_VERSION=$(cat versions/openssl-quic.txt)" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SUBV="${{ github.event.inputs.SUBVERSION }}"
          else
            SUBV="0"
          fi
          echo "SUBVERSION=$SUBV" >> "$GITHUB_OUTPUT"

          UNBOUND_VERSION="$(cat versions/unbound.txt)"
          UNBOUND_DOCKER_IMAGE_VERSION="${UNBOUND_VERSION}-${SUBV}"
          echo "UNBOUND_DOCKER_IMAGE_VERSION=$UNBOUND_DOCKER_IMAGE_VERSION" >> "$GITHUB_OUTPUT"

          echo "${UNBOUND_DOCKER_IMAGE_VERSION}" > versions/unbound-docker-image.txt

  build:
    runs-on: ubuntu-latest
    needs: buildvars

    strategy:
      matrix:
        variant: [release, quic]

    env:
      DOCKERHUB_SLUG: "madnuttah/unbound-dev"

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          token: "${{ secrets.BOT_GITHUB_TOKEN }}"
          persist-credentials: false
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Dockerhub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          username: "${{ secrets.DOCKERHUB_USERNAME }}"
          password: "${{ secrets.DOCKERHUB_TOKEN }}"

      - name: Select variant metadata
        id: meta
        run: |
          if [ "${{ matrix.variant }}" = "release" ]; then
            echo "DOCKERFILE=unbound/release.Dockerfile" >> "$GITHUB_OUTPUT"
            echo "TAG_SUFFIX=" >> "$GITHUB_OUTPUT"
            echo "CACHE_KEY=buildcache" >> "$GITHUB_OUTPUT"
          else
            echo "DOCKERFILE=unbound/release_quic.Dockerfile" >> "$GITHUB_OUTPUT"
            echo "TAG_SUFFIX=-quic" >> "$GITHUB_OUTPUT"
            echo "CACHE_KEY=buildcache-quic" >> "$GITHUB_OUTPUT"
          fi

- name: Build and push image
  uses: docker/build-push-action@v6
  with:
    context: .
    builder: "${{ steps.buildx.outputs.name }}"
    file: "${{ steps.meta.outputs.DOCKERFILE }}"

    build-contexts: |
      base=docker/base.Dockerfile

    platforms: |
      linux/amd64,linux/arm64,linux/386,
      linux/arm/v6,linux/arm/v7,
      linux/ppc64le,linux/s390x,linux/riscv64

    push: ${{ github.event_name != 'pull_request' }}
    sbom: ${{ github.event_name != 'pull_request' }}
    provenance: ${{ github.event_name != 'pull_request' }}

    build-args: |
      IMAGE_BUILD_DATE=${{ needs.buildvars.outputs.IMAGE_BUILD_DATE }}
      UNBOUND_VERSION=${{ needs.buildvars.outputs.UNBOUND_VERSION }}
      UNBOUND_SHA256=${{ needs.buildvars.outputs.UNBOUND_SHA256 }}
      UNBOUND_DOCKER_IMAGE_VERSION=${{ needs.buildvars.outputs.UNBOUND_DOCKER_IMAGE_VERSION }}
      OPENSSL_BUILDENV_VERSION=${{ needs.buildvars.outputs.OPENSSL_BUILDENV_VERSION }}
      OPENSSL_QUIC_BUILDENV_VERSION=${{ needs.buildvars.outputs.OPENSSL_QUIC_BUILDENV_VERSION }}

    cache-from: |
      type=registry,ref=${{ env.DOCKERHUB_SLUG }}:${{ steps.meta.outputs.CACHE_KEY }}

    cache-to: |
      type=registry,ref=${{ env.DOCKERHUB_SLUG }}:${{ steps.meta.outputs.CACHE_KEY }},mode=max

    tags: |
      ${{ env.DOCKERHUB_SLUG }}:${{ needs.buildvars.outputs.UNBOUND_DOCKER_IMAGE_VERSION }}${{ steps.meta.outputs.TAG_SUFFIX }}
      ${{ env.DOCKERHUB_SLUG }}:latest${{ steps.meta.outputs.TAG_SUFFIX }}
